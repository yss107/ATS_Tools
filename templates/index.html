<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume ATS Tool</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .main-content {
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .upload-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .file-upload {
            position: relative;
            display: inline-block;
            cursor: pointer;
            padding: 20px 40px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border-radius: 10px;
            border: none;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .file-upload:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }

        .file-upload input[type=file] {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .keywords-section {
            margin-bottom: 30px;
        }

        .keywords-section label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
            color: #555;
        }

        .keywords-input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        .keywords-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .analyze-btn {
            background: linear-gradient(45deg, #4CAF50, #45a049);
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }

        .analyze-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .analyze-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .results {
            display: none;
            margin-top: 30px;
        }

        .score-section {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 10px;
        }

        .score {
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .score.excellent { color: #4CAF50; }
        .score.good { color: #FF9800; }
        .score.poor { color: #f44336; }

        .analysis-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .analysis-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .analysis-card h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.2rem;
        }

        .keyword-tag {
            display: inline-block;
            background: #e9ecef;
            padding: 5px 10px;
            margin: 3px;
            border-radius: 15px;
            font-size: 0.9rem;
            color: #495057;
        }

        .recommendations {
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            border-radius: 8px;
            padding: 20px;
        }

        .recommendations h3 {
            color: #856404;
            margin-bottom: 15px;
        }

        .recommendations ul {
            list-style: none;
        }

        .recommendations li {
            margin-bottom: 8px;
            padding-left: 20px;
            position: relative;
        }

        .recommendations li:before {
            content: "💡";
            position: absolute;
            left: 0;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
        }

        .file-info {
            text-align: center;
            margin-top: 10px;
            font-size: 0.9rem;
            color: #666;
        }

        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }
            
            .header h1 {
                font-size: 2rem;
            }
            
            .main-content {
                padding: 20px;
            }
            
            .analysis-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Resume ATS Tool</h1>
            <p>Analyze and optimize your resume for Applicant Tracking Systems</p>
        </div>

        <div class="main-content">
            <form id="resumeForm" enctype="multipart/form-data">
                <div class="upload-section">
                    <div class="file-upload">
                        <input type="file" id="resumeFile" name="resume" accept=".pdf,.docx,.txt" required>
                        Choose Resume File
                    </div>
                    <div class="file-info" id="fileInfo"></div>
                </div>

                <div class="keywords-section">
                    <label for="keywords">Additional Keywords (comma-separated):</label>
                    <input type="text" id="keywords" name="keywords" class="keywords-input" 
                           placeholder="e.g., python, react, project management, leadership">
                </div>

                <button type="submit" class="analyze-btn" id="analyzeBtn">
                    Analyze Resume
                </button>
            </form>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Analyzing your resume...</p>
            </div>

            <div class="results" id="results">
                <div class="score-section">
                    <div class="score" id="atsScore">--</div>
                    <p>ATS Compatibility Score</p>
                </div>

                <div class="analysis-grid">
                    <div class="analysis-card">
                        <h3>📊 Resume Statistics</h3>
                        <div id="stats"></div>
                    </div>

                    <div class="analysis-card">
                        <h3>🔍 Keywords Found</h3>
                        <div id="keywords-found"></div>
                    </div>

                    <div class="analysis-card">
                        <h3>⚠️ Issues Found</h3>
                        <div id="issues"></div>
                    </div>
                </div>

                <div class="recommendations">
                    <h3>💡 Recommendations</h3>
                    <ul id="recommendations-list"></ul>
                </div>
            </div>

            <div class="error" id="error" style="display: none;"></div>
        </div>
    </div>

    <script>
        document.getElementById('resumeFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const fileInfo = document.getElementById('fileInfo');
            
            if (file) {
                const size = (file.size / 1024 / 1024).toFixed(2);
                fileInfo.textContent = `Selected: ${file.name} (${size} MB)`;
            } else {
                fileInfo.textContent = '';
            }
        });

        document.getElementById('resumeForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = new FormData();
            const fileInput = document.getElementById('resumeFile');
            const keywordsInput = document.getElementById('keywords');
            
            if (!fileInput.files[0]) {
                alert('Please select a resume file');
                return;
            }
            
            formData.append('resume', fileInput.files[0]);
            formData.append('keywords', keywordsInput.value);
            
            // Show loading state
            document.getElementById('analyzeBtn').disabled = true;
            document.getElementById('loading').style.display = 'block';
            document.getElementById('results').style.display = 'none';
            document.getElementById('error').style.display = 'none';
            
            try {
                const response = await fetch('/analyze', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.error || 'Analysis failed');
                }
                
                displayResults(data);
                
            } catch (error) {
                document.getElementById('error').textContent = error.message;
                document.getElementById('error').style.display = 'block';
            } finally {
                document.getElementById('analyzeBtn').disabled = false;
                document.getElementById('loading').style.display = 'none';
            }
        });

        function displayResults(data) {
            if (!data.success) {
                throw new Error(data.error || 'Analysis failed');
            }
            
            // Display score
            const score = data.score.score;
            const scoreElement = document.getElementById('atsScore');
            scoreElement.textContent = score + '/100';
            
            if (score >= 80) {
                scoreElement.className = 'score excellent';
            } else if (score >= 60) {
                scoreElement.className = 'score good';
            } else {
                scoreElement.className = 'score poor';
            }
            
            // Display statistics
            document.getElementById('stats').innerHTML = `
                <p><strong>Word Count:</strong> ${data.word_count}</p>
                <p><strong>Text Length:</strong> ${data.text_length} characters</p>
                <p><strong>Readability Score:</strong> ${data.score.readability_score?.toFixed(1) || 'N/A'}</p>
            `;
            
            // Display keywords
            let keywordsHtml = '';
            for (const [category, keywords] of Object.entries(data.keywords)) {
                if (keywords.length > 0) {
                    keywordsHtml += `<p><strong>${category.replace('_', ' ').replace(/\b\w/g, l => l.toUpperCase())}:</strong></p>`;
                    keywordsHtml += keywords.map(keyword => `<span class="keyword-tag">${keyword}</span>`).join('');
                }
            }
            document.getElementById('keywords-found').innerHTML = keywordsHtml || '<p>No keywords found</p>';
            
            // Display issues
            const issues = data.formatting.issues;
            if (issues.length > 0) {
                document.getElementById('issues').innerHTML = '<ul>' + 
                    issues.map(issue => `<li>${issue}</li>`).join('') + '</ul>';
            } else {
                document.getElementById('issues').innerHTML = '<p style="color: green;">No major issues found!</p>';
            }
            
            // Display recommendations
            const recommendations = data.recommendations.slice(0, 10); // Show top 10
            document.getElementById('recommendations-list').innerHTML = 
                recommendations.map(rec => `<li>${rec}</li>`).join('');
            
            document.getElementById('results').style.display = 'block';
        }
    </script>
</body>
</html>
